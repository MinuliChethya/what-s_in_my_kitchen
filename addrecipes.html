<!DOCTYPE html>
<html>
<head>
<title>Add Recipe</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
<style>

body{
margin:0;
font-family:Arial;
background-image: url("https://i.pinimg.com/736x/e3/87/fd/e387fd40f1ff8c5e986f1b246be9337d.jpg");
background-attachment:fixed;
background-size:cover;
background-position:center;
}

/* Desktop container */
.main-container{
max-width:1200px;
width:100%;
margin:auto;
/* background:white; */  /* Transparent to show background */
}

/* Navigation */
nav{
background:#e6a87a;
padding:10px 0;
text-align:center;
color:#670D0D;
}

/* Page section */
.section {
    min-height: 500px;
    height: auto;
    padding: 40px 20px;
    text-align: center;
}

/* Title - matching homepage style */
.page-title {
    background: transparent;
    padding: clamp(15px, 4vw, 30px) clamp(30px, 8vw, 100px);
    border-radius: 30px;
    margin: 0 auto 40px auto;
    max-width: 90%;
    width: fit-content;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: bold;
    color: #7a0000;
}

/* Form box */
.form-box {
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;
    border-radius: 40px;
    max-width: 700px;
    width: 95%;
    margin: 0 auto 40px auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    border: 2px solid #e6a87a;
}

.form-box h2 {
    text-align: center;
    color: #7a0000;
    font-size: clamp(1.5rem, 4vw, 2rem);
    font-weight: bold;
    margin-bottom: 30px;
    padding-bottom: 15px;
    border-bottom: 3px solid #e6a87a;
    display: inline-block;
    width: 100%;
}

/* Form labels */
label {
    color: #670D0D;
    font-weight: bold;
    margin-top: 15px;
    display: block;
    text-align: left;
    font-size: 1rem;
}

label:first-of-type {
    margin-top: 0;
}

/* Form inputs */
input, textarea, select {
    width: 100%;
    padding: 12px 15px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 15px;
    border: 2px solid #e6a87a;
    font-size: 1rem;
    transition: all 0.3s ease;
    background: white;
}

input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #7a0000;
    box-shadow: 0 0 0 3px rgba(122, 0, 0, 0.1);
}

textarea {
    min-height: 100px;
    resize: vertical;
}

/* Form button */
.form-btn {
    background: #7a0000;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 40px;
    cursor: pointer;
    width: 100%;
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-weight: bold;
    margin-top: 20px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.form-btn:hover {
    background: #5b390b;
    transform: scale(1.02);
}

.form-btn i {
    font-size: 1.2rem;
}

/* Helper text */
.helper-text {
    text-align: left;
    color: #666;
    font-size: 0.85rem;
    margin-top: -10px;
    margin-bottom: 10px;
    font-style: italic;
}

/* Success message */
.success-message {
    background: #4CAF50;
    color: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 10px;
    font-weight: bold;
}

.success-message.show {
    display: flex;
}

.success-message i {
    font-size: 1.2rem;
}

/* Footer */
footer{
background:black;
color:white;
text-align:center;
padding:15px;
margin-top: 20px;
}

/* Navigation styling */
.nav-pills {
    justify-content: center;
}

.nav-pills .nav-link {
color: #8b0000; 
font-weight: bold;
margin: 0 10px;
}

.nav-pills .nav-link.active {
    background-color: rgb(182, 128, 58);
    color: #670D0D; 
    font-weight: bold;
}

.nav-link:hover {
    color: #ffb54d;
    text-decoration: underline;
}

/* Responsive adjustments */
@media screen and (max-width: 1200px) {
    .main-container {
        width: 95%;
    }
}

@media screen and (max-width: 768px) {
    .nav-pills {
        flex-direction: column;
        align-items: center;
    }
    
    .nav-pills .nav-link {
        width: 100%;
        text-align: center;
        margin: 3px 0 !important;
    }
    
    .form-box {
        width: 92%;
        padding: 25px;
    }
    
    .page-title {
        font-size: clamp(1.8rem, 5vw, 2.2rem);
    }
}

@media screen and (max-width: 480px) {
    .page-title {
        font-size: 1.8rem;
        padding: 15px 25px;
    }
    
    .form-box {
        padding: 20px;
    }
    
    .form-box h2 {
        font-size: 1.5rem;
    }
    
    input, textarea, select {
        padding: 10px 12px;
    }
    
    .form-btn {
        padding: 12px 20px;
    }
    
    footer span {
        display: block;
        margin: 5px 0;
    }
    
    footer a {
        display: block;
        margin: 5px 0;
    }
}

</style>
</head>

<body>

<div class="main-container">

<nav>
<ul class="nav nav-pills justify-content-center">
  <li class="nav-item">
    <a class="nav-link" href="index.html">Home</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="pantry.html">Pantry</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="recipes.html">Recipes</a>
  </li>
  <li class="nav-item">
    <a class="nav-link active" aria-current="page" href="addrecipes.html">Add Recipe</a>
  </li>
   <li class="nav-item">
    <a class="nav-link" href="profile.html">Profile</a>
  </li>
</ul>
</nav>

<div class="section">

<div class="page-title">
    <i class="bi bi-pencil-square"></i> Share Your Recipe
</div>

<div class="form-box">

<h2><i class="bi bi-plus-circle-fill"></i> Add New Recipe</h2>

<!-- Success message -->
<div id="successMessage" class="success-message">
    <i class="bi bi-check-circle-fill"></i>
    <span>Recipe saved successfully!</span>
</div>

<form onsubmit="saveRecipe(event)">

<label><i class="bi bi-file-text"></i> Recipe Name</label>
<input type="text" id="name" placeholder="e.g. Spaghetti Carbonara" required>

<label><i class="bi bi-basket"></i> Ingredients (comma separated)</label>
<textarea id="ingredients" placeholder="e.g. Pasta, Eggs, Cheese, Bacon" required></textarea>
<div class="helper-text">Separate each ingredient with a comma</div>

<label><i class="bi bi-list-check"></i> Cooking Steps (comma separated)</label>
<textarea id="steps" placeholder="e.g. Boil pasta, Fry bacon, Mix eggs, Combine all" required></textarea>
<div class="helper-text">Separate each step with a comma</div>

<label><i class="bi bi-clock"></i> Cooking Time</label>
<input type="text" id="time" placeholder="e.g. 20 min" required>

<label><i class="bi bi-bar-chart"></i> Difficulty</label>
<select id="difficulty" required>
    <option value="" disabled selected>Select difficulty</option>
    <option>Easy</option>
    <option>Medium</option>
    <option>Hard</option>
</select>

<label><i class="bi bi-image"></i> Recipe Image URL (optional)</label>
<input type="url" id="image" placeholder="https://example.com/image.jpg">
<div class="helper-text">Leave empty for default image</div>

<button type="submit" class="form-btn">
    <i class="bi bi-save"></i> Save Recipe
</button>

</form>

</div>

</div>

<footer>
© 2026 What's in My Kitchen? | Privacy | Terms | Contact
</footer>

</div>

<script>

function saveRecipe(e) {
    e.preventDefault()
    
    // Get form values
    let name = document.getElementById("name").value
    let ingredients = document.getElementById("ingredients").value.split(",").map(i => i.trim())
    let steps = document.getElementById("steps").value.split(",").map(s => s.trim())
    let time = document.getElementById("time").value
    let difficulty = document.getElementById("difficulty").value
    let image = document.getElementById("image").value || "https://images.unsplash.com/photo-1490474418585-ba9bad8fd0ea" // Default image
    
    // Create new recipe object
    let newRecipe = {
        name: name,
        ingredients: ingredients,
        steps: steps,
        time: time,
        difficulty: difficulty,
        img: image
    }
    
    // Get existing recipes
    let recipes = JSON.parse(localStorage.getItem("userRecipes")) || []
    
    // Add new recipe
    recipes.push(newRecipe)
    
    // Save to localStorage
    localStorage.setItem("userRecipes", JSON.stringify(recipes))
    
    // Show success message
    let successMsg = document.getElementById("successMessage")
    successMsg.classList.add("show")
    
    // Reset form
    document.querySelector("form").reset()
    
    // Hide success message after 3 seconds
    setTimeout(() => {
        successMsg.classList.remove("show")
    }, 3000)
    
    // Scroll to top to show message
    window.scrollTo({ top: 0, behavior: 'smooth' })
}

</script>

</body>
</html>
