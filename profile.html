<!DOCTYPE html>
<html>
<head>
<title>Profile - What's in My Kitchen?</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
<style>

body{
margin:0;
font-family:Arial;
background-image: url("https://i.pinimg.com/1200x/2d/e6/a3/2de6a374fa68b10533d0785e2dcbcfb4.jpg");
background-attachment:fixed;
background-size:cover;
background-position:center;
}

/* Desktop container */
.main-container{
max-width:1200px;
width:100%;
margin:auto;
/* background:white; */
}

/* Navigation */
nav {
    background: #e6a87a;
    padding: 10px 0;
    text-align: center;
    color: #670D0D;
}

/* Main content */
.main-content {
    padding: 40px 20px;
    min-height: 500px;
}

/* Title - matching homepage style */
.title {
    background: transparent;
    padding: clamp(15px, 4vw, 30px) clamp(30px, 8vw, 100px);
    border-radius: 30px;
    margin: 0 auto 40px auto;
    max-width: 90%;
    width: fit-content;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: bold;
    color: #7a0000;
    text-align: center;
}

/* Profile and Recipes Row */
.profile-row {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    max-width: 1100px;
    margin: 0 auto;
}

/* Left column - Profile card */
.profile-card {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 30px;
    width: 320px;
    flex-shrink: 0;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    border: 2px solid #e6a87a;
}

.profile-icon {
    width: 120px;
    height: 120px;
    background: #7a0000;
    border-radius: 60px;
    margin: 0 auto 25px;
    text-align: center;
    line-height: 120px;
    color: white;
    font-size: 50px;
    border: 4px solid #e6a87a;
}

.info-item {
    margin: 20px 0;
}

.info-label {
    color: #7a0000;
    font-weight: bold;
    font-size: 14px;
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
}

.info-label i {
    color: #e6a87a;
    font-size: 1rem;
}

.info-value {
    color: #333;
    font-size: 16px;
    margin-top: 5px;
}

/* Form controls */
.form-control {
    width: 100%;
    padding: 10px 15px;
    border: 2px solid #e6a87a;
    border-radius: 15px;
    font-size: 1rem;
    transition: all 0.3s ease;
    background: white;
}

.form-control:focus {
    outline: none;
    border-color: #7a0000;
    box-shadow: 0 0 0 3px rgba(122, 0, 0, 0.1);
}

.form-control:disabled {
    background: #f8f9fa;
    border-color: #ddd;
    color: #666;
}

/* Button styles */
.edit-btn {
    background: #7a0000;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    width: 100%;
    cursor: pointer;
    font-weight: bold;
    margin: 10px 0;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 1rem;
}

.edit-btn:hover {
    background: #5b390b;
    transform: scale(1.02);
}

.edit-btn i {
    font-size: 1.1rem;
}

#saveBtn {
    background: #28a745;
}

#saveBtn:hover {
    background: #218838;
}

/* Right column - Saved recipes */
.recipes-section {
    flex: 1;
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    border: 2px solid #e6a87a;
}

.recipes-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 3px solid #e6a87a;
}

.recipes-header h2 {
    color: #7a0000;
    margin: 0;
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    display: flex;
    align-items: center;
    gap: 10px;
}

.recipes-header h2 i {
    color: #e6a87a;
}

/* Recipe count badge */
.recipe-count {
    background: #e6a87a;
    color: #670D0D;
    padding: 5px 15px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 0.9rem;
}

/* Recipe grid */
.recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    min-height: 200px;
}

/* Recipe card */
.recipe-card {
    background: rgba(230, 168, 122, 0.2);
    padding: 20px 15px;
    border-radius: 20px;
    text-align: center;
    position: relative;
    color: #670D0D;
    font-weight: bold;
    border: 2px solid #e6a87a;
    transition: all 0.3s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.recipe-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    background: rgba(230, 168, 122, 0.3);
}

.recipe-card i {
    font-size: 2rem;
    color: #7a0000;
    margin-bottom: 5px;
}

.recipe-name {
    font-size: 1rem;
    margin-bottom: 10px;
    line-height: 1.4;
}

/* Remove button */
.remove-recipe {
    background: #dc3545;
    color: white;
    border: none;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    margin-top: 5px;
}

.remove-recipe:hover {
    background: #c82333;
}

/* Empty state */
.empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px;
    color: #666;
    background: rgba(230, 168, 122, 0.1);
    border-radius: 20px;
    border: 2px dashed #e6a87a;
}

.empty-state i {
    font-size: 3rem;
    color: #e6a87a;
    margin-bottom: 15px;
}

.empty-state p {
    font-size: 1rem;
    margin-bottom: 15px;
}

.empty-state .browse-btn {
    background: #7a0000;
    color: white;
    padding: 10px 25px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    display: inline-block;
    transition: all 0.3s ease;
}

.empty-state .browse-btn:hover {
    background: #5b390b;
    transform: scale(1.05);
}

/* Footer */
footer{
background:black;
color:white;
text-align:center;
padding:15px;
margin-top: 30px;
}

/* Navigation styling */
.nav-pills {
    justify-content: center;
}

.nav-pills .nav-link {
color: #8b0000; 
font-weight: bold;
margin: 0 10px;
}

.nav-pills .nav-link.active {
    background-color: rgb(182, 128, 58);
    color: #670D0D; 
    font-weight: bold;
}

.nav-link:hover {
    color: #ffb54d;
    text-decoration: underline;
}

/* Responsive adjustments */
@media screen and (max-width: 1200px) {
    .main-container {
        width: 95%;
    }
}

@media screen and (max-width: 768px) {
    .profile-row {
        flex-direction: column;
    }
    
    .profile-card {
        width: 100%;
    }
    
    .nav-pills {
        flex-direction: column;
        align-items: center;
    }
    
    .nav-pills .nav-link {
        width: 100%;
        text-align: center;
        margin: 3px 0 !important;
    }
    
    .recipe-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    }
}

@media screen and (max-width: 480px) {
    .title {
        font-size: 2rem;
        padding: 15px 25px;
    }
    
    .profile-card {
        padding: 20px;
    }
    
    .recipes-section {
        padding: 20px;
    }
    
    .recipe-grid {
        grid-template-columns: 1fr;
    }
    
    footer span {
        display: block;
        margin: 5px 0;
    }
    
    footer a {
        display: block;
        margin: 5px 0;
    }
}

</style>
</head>
<body>

<div class="main-container">

<!-- Navigation -->
<nav>
<ul class="nav nav-pills justify-content-center">
  <li class="nav-item">
    <a class="nav-link" href="index.html">Home</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="pantry.html">Pantry</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="recipes.html">Recipes</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="addrecipes.html">Add Recipe</a>
  </li>
   <li class="nav-item">
    <a class="nav-link active" aria-current="page" href="profile.html">Profile</a>
  </li>
</ul>
</nav>

<!-- Main Content -->
<div class="main-content">

    <div class="title">
        <i class="bi bi-person-circle"></i> My Profile
    </div>

    <!-- Profile and Recipes Row -->
    <div class="profile-row">
        
        <!-- Left: Profile Card -->
        <div class="profile-card">
            <div class="profile-icon">
                <i class="bi bi-person-fill"></i>
            </div>
            
            <div class="info-item">
                <div class="info-label"><i class="bi bi-person"></i> Name:</div>
                <input type="text" id="name" class="form-control" disabled value="John Doe">
            </div>
            
            <div class="info-item">
                <div class="info-label"><i class="bi bi-envelope"></i> Email:</div>
                <input type="email" id="email" class="form-control" disabled value="john.doe@email.com">
            </div>
            
            <div class="info-item">
                <div class="info-label"><i class="bi bi-calendar"></i> Member Since:</div>
                <input type="text" id="member" class="form-control" disabled value="January 2026">
            </div>
            
            <button class="edit-btn" onclick="editProfile()">
                <i class="bi bi-pencil"></i> Edit Profile
            </button>
            <button class="edit-btn" onclick="saveProfile()" id="saveBtn" style="display:none;">
                <i class="bi bi-check-circle"></i> Save Changes
            </button>
        </div>

        
        <!-- Right: Saved Recipes -->
        <div class="recipes-section">
            <div class="recipes-header">
                <h2>
                    <i class="bi bi-bookmark-heart"></i> 
                    Saved Recipes
                </h2>
                <span class="recipe-count" id="recipeCount">0 recipes</span>
            </div>
            
            <div class="recipe-grid" id="savedRecipesGrid">
                <!-- Saved recipes will be displayed here dynamically -->
            </div>
        </div>
    </div>

</div>

<!-- Footer -->
<footer>
  © 2026 What's in My Kitchen? | Privacy | Terms | Contact
</footer>

</div>

<script>
// Initialize profile data if not exists
if (!localStorage.getItem("profile")) {
    let defaultProfile = {
        name: "John Doe",
        email: "john.doe@email.com",
        member: "January 2026"
    }
    localStorage.setItem("profile", JSON.stringify(defaultProfile))
}

// Load profile data
let profile = JSON.parse(localStorage.getItem("profile"))
document.getElementById("name").value = profile.name
document.getElementById("email").value = profile.email
document.getElementById("member").value = profile.member

// Load saved recipes
function loadSavedRecipes() {
    let savedRecipes = JSON.parse(localStorage.getItem("savedRecipes")) || []
    let grid = document.getElementById("savedRecipesGrid")
    let countSpan = document.getElementById("recipeCount")
    
    // Update count
    countSpan.textContent = savedRecipes.length + (savedRecipes.length === 1 ? " recipe" : " recipes")
    
    if (savedRecipes.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <i class="bi bi-bookmark-plus"></i>
                <p>No saved recipes yet</p>
                <p style="font-size: 0.9rem;">Browse recipes and save them to your collection!</p>
                <a href="recipes.html" class="browse-btn">
                    <i class="bi bi-search"></i> Browse Recipes
                </a>
            </div>
        `
    } else {
        grid.innerHTML = ""
        savedRecipes.forEach((recipe, index) => {
            grid.innerHTML += `
                <div class="recipe-card" onclick="viewRecipe('${index}')">
                    <i class="bi bi-bookmark-check-fill"></i>
                    <span class="recipe-name">${recipe.name}</span>
                    <button class="remove-recipe" onclick="removeRecipe('${index}', event)">
                        <i class="bi bi-trash"></i> Remove
                    </button>
                </div>
            `
        })
    }
}

// View recipe
function viewRecipe(index) {
    let savedRecipes = JSON.parse(localStorage.getItem("savedRecipes")) || []
    localStorage.setItem("selectedRecipe", JSON.stringify(savedRecipes[index]))
    window.location.href = "recipe-details.html"
}

// Remove recipe
function removeRecipe(index, event) {
    event.stopPropagation() // Prevent triggering the card click
    
    if (confirm("Remove this recipe from your saved collection?")) {
        let savedRecipes = JSON.parse(localStorage.getItem("savedRecipes")) || []
        savedRecipes.splice(index, 1)
        localStorage.setItem("savedRecipes", JSON.stringify(savedRecipes))
        loadSavedRecipes() // Reload the grid
        
        // Show feedback
        alert("Recipe removed from your profile!")
    }
}

// Profile edit functions
function editProfile() {
    document.getElementById("name").disabled = false
    document.getElementById("email").disabled = false
    document.getElementById("member").disabled = false
    document.getElementById("saveBtn").style.display = "block"
}

function saveProfile() {
    let newProfile = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        member: document.getElementById("member").value
    }
    
    localStorage.setItem("profile", JSON.stringify(newProfile))
    
    document.getElementById("name").disabled = true
    document.getElementById("email").disabled = true
    document.getElementById("member").disabled = true
    document.getElementById("saveBtn").style.display = "none"
    
    alert("Profile Updated Successfully!")
}

// Load saved recipes when page loads
loadSavedRecipes()

</script>

</body>
</html>
